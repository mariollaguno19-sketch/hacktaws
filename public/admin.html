<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bandeja CRM Ejecutivo - Futuro Academy</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Outfit', sans-serif;
            margin: 0;
            padding: 0;
            background: #090d16;
            color: #ffffff;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        /* Enlace de regreso */
        .back-link {
            text-decoration: none;
            color: #94a3b8;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.2s;
            display: inline-block;
            margin-bottom: 24px;
        }

        .back-link:hover {
            color: #ffffff;
        }

        /* Pantallas */
        .screen {
            display: none;
        }

        .screen.active {
            display: block;
        }

        /* Login Bento Card */
        #admin-login-section {
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.08);
            max-width: 420px;
            margin: 60px auto 0 auto;
            padding: 48px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            text-align: center;
            box-sizing: border-box;
        }

        #admin-login-section h2 {
            font-size: 26px;
            font-weight: 700;
            margin: 0 0 12px 0;
            letter-spacing: -0.02em;
        }

        #admin-login-section p {
            font-size: 14px;
            color: #94a3b8;
            margin: 0 0 32px 0;
            font-weight: 300;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #cbd5e1;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input[type="text"], input[type="password"] {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff;
            padding: 12px 20px;
            border-radius: 9999px; /* Input píldora */
            font-size: 15px;
            font-family: inherit;
            width: 100%;
            box-sizing: border-box;
            outline: none;
            transition: all 0.3s;
        }

        input[type="text"]:focus, input[type="password"]:focus {
            border-color: #c5f82a;
            background: rgba(255, 255, 255, 0.06);
        }

        /* Botón píldora */
        .btn-pill {
            background: #ffffff;
            color: #000000;
            border: none;
            padding: 12px 28px;
            border-radius: 9999px;
            cursor: pointer;
            font-size: 14.5px;
            font-weight: 600;
            font-family: inherit;
            transition: all 0.2s;
            display: inline-block;
            text-align: center;
        }

        .btn-pill:hover:not(:disabled) {
            background: #e2e8f0;
            transform: scale(1.02);
        }

        .btn-pill-dark {
            background: rgba(255, 255, 255, 0.04);
            color: #e2e8f0;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .btn-pill-dark:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.16);
            color: #ffffff;
        }

        .login-error {
            color: #ef4444;
            font-size: 13.5px;
            margin-top: 16px;
            min-height: 20px;
        }

        /* Dashboard Header */
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding-bottom: 24px;
            margin-bottom: 32px;
        }

        .dashboard-header h2 {
            font-size: 28px;
            font-weight: 700;
            margin: 0;
            letter-spacing: -0.03em;
        }

        .header-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .user-welcome {
            font-size: 14px;
            color: #94a3b8;
            margin-right: 12px;
        }

        .user-welcome span {
            color: #ffffff;
            font-weight: 600;
        }

        /* Analíticas Bento Grid */
        .analytics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }

        .widget-card {
            border-radius: 20px;
            padding: 28px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 150px;
        }

        .widget-card .title {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            opacity: 0.75;
        }

        .widget-card .value {
            font-size: 48px; /* Número gigante estilo la referencia */
            font-weight: 700;
            letter-spacing: -0.04em;
            line-height: 1;
            margin-top: 16px;
        }

        /* Colores específicos de analíticas */
        .widget-total {
            background: #c5f82a; /* Verde Neón */
            color: #000000;
        }

        .widget-b2b {
            background: #c2f2e9; /* Menta */
            color: #000000;
        }

        .widget-b2c {
            background: #ffd3e8; /* Rosa Pastel */
            color: #000000;
        }

        .widget-priority {
            background: #38bdf8; /* Azul Eléctrico */
            color: #000000;
        }

        /* Barra de filtros */
        .filter-bar {
            background: rgba(15, 23, 42, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.06);
            padding: 16px 28px;
            border-radius: 16px;
            margin-bottom: 32px;
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
            align-items: center;
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .filter-group label {
            font-size: 14px;
            color: #94a3b8;
            font-weight: 500;
        }

        select {
            background: #090d16;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff;
            padding: 8px 16px;
            border-radius: 9999px; /* select píldora */
            font-family: inherit;
            font-size: 14px;
            outline: none;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        select:focus {
            border-color: #c5f82a;
        }

        /* Contenedor de Leads */
        #leads-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .lead-card {
            background: rgba(15, 23, 42, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-left: 8px solid #c5f82a; /* Borde izquierdo estilizado */
            border-radius: 20px;
            padding: 28px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            transition: transform 0.2s, border-color 0.2s;
            box-sizing: border-box;
        }

        .lead-card:hover {
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.12);
        }

        .lead-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            padding-bottom: 16px;
            margin-bottom: 20px;
        }

        .lead-header h3 {
            margin: 0;
            font-size: 18px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: -0.02em;
        }

        .priority-badge {
            background: rgba(197, 248, 42, 0.1);
            color: #c5f82a;
            border: 1px solid rgba(197, 248, 42, 0.25);
            padding: 6px 16px;
            border-radius: 9999px; /* Insignia píldora */
            font-weight: 700;
            font-size: 12.5px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .lead-info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .lead-info-item p {
            margin: 0 0 8px 0;
            font-size: 14px;
            line-height: 1.5;
            color: #cbd5e1;
        }

        .lead-info-item strong {
            color: #94a3b8;
            font-weight: 500;
        }

        .lead-status-row {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14.5px;
            margin-top: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            padding-top: 16px;
        }

        .status-indicator {
            font-weight: 700;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 0.05em;
        }

        .proposal-area {
            margin-top: 20px;
        }

        .proposal-area label {
            display: block;
            font-size: 13.5px;
            font-weight: 500;
            color: #cbd5e1;
            margin-bottom: 8px;
        }

        textarea {
            width: 100%;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #ffffff;
            padding: 14px;
            border-radius: 14px;
            font-family: inherit;
            font-size: 14.5px;
            line-height: 1.5;
            box-sizing: border-box;
            outline: none;
            resize: vertical;
            transition: border-color 0.2s;
        }

        textarea:focus {
            border-color: #c5f82a;
            background: rgba(255, 255, 255, 0.04);
        }

        .lead-actions {
            margin-top: 24px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }

        .actions-left {
            display: flex;
            gap: 8px;
        }

        .btn-action {
            background: #ffffff;
            color: #000000;
            border: none;
            padding: 10px 20px;
            border-radius: 9999px; /* Botones de acción píldora */
            cursor: pointer;
            font-size: 13.5px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-action:hover {
            transform: scale(1.02);
        }

        .btn-approve {
            background: #c5f82a;
            color: #000000;
        }
        .btn-approve:hover {
            background: #d4fa55;
        }

        .btn-edit {
            background: #c2f2e9;
            color: #000000;
        }
        .btn-edit:hover {
            background: #d5faf3;
        }

        .btn-reject {
            background: #ffd3e8;
            color: #000000;
        }
        .btn-reject:hover {
            background: #ffe3f1;
        }

        .btn-delete {
            background: transparent;
            color: #94a3b8;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .btn-delete:hover {
            background: rgba(239, 68, 68, 0.1);
            border-color: rgba(239, 68, 68, 0.3);
            color: #f87171;
        }
    </style>
</head>
<body>

    <div class="container">
        <a href="index.html" class="back-link">Regresar al inicio</a>

        <!-- PANTALLA LOGIN -->
        <div id="admin-login-section" class="screen active">
            <h2>Acceso Ejecutivo</h2>
            <p>Ingrese las credenciales corporativas para ver la bandeja de leads calificados por la IA.</p>
            
            <div class="form-group">
                <label for="admin-user">Usuario</label>
                <input type="text" id="admin-user" placeholder="Ingrese su usuario">
            </div>

            <div class="form-group">
                <label for="admin-pass">Contraseña</label>
                <input type="password" id="admin-pass" placeholder="Ingrese su contraseña">
            </div>

            <button class="btn-pill" id="login-btn" style="width: 100%; margin-top: 8px;" onclick="loginAdmin()">Ingresar al Dashboard</button>
            <div class="login-error" id="login-error"></div>
        </div>

        <!-- PANTALLA BANDEJA CRM -->
        <div id="admin-dashboard-section" class="screen">
            <div class="dashboard-header">
                <h2>Bandeja CRM Ejecutivo</h2>
                <div class="header-actions">
                    <div class="user-welcome">Usuario: <span id="admin-nombre"></span></div>
                    <button class="btn-pill btn-pill-dark" onclick="loadLeads()">Actualizar</button>
                    <button class="btn-pill btn-pill-dark" onclick="logoutAdmin()">Cerrar Sesión</button>
                </div>
            </div>

            <!-- Analíticas Bento Grid con números gigantes -->
            <div class="analytics-grid">
                <div class="widget-card widget-total">
                    <div class="title">Total Prospectos</div>
                    <div class="value" id="kpi-total">0</div>
                </div>
                <div class="widget-card widget-b2b">
                    <div class="title">Corporativos (B2B)</div>
                    <div class="value" id="kpi-b2b">0</div>
                </div>
                <div class="widget-card widget-b2c">
                    <div class="title">Personales (B2C)</div>
                    <div class="value" id="kpi-b2c">0</div>
                </div>
                <div class="widget-card widget-priority">
                    <div class="title">Promedio Prioridad</div>
                    <div class="value" id="kpi-priority">0.0</div>
                </div>
            </div>

            <!-- Barra de Filtros -->
            <div class="filter-bar">
                <div class="filter-group">
                    <label for="filter-type">Tipo de Cliente:</label>
                    <select id="filter-type" onchange="applyFilters()">
                        <option value="ALL">Todos</option>
                        <option value="B2B">Corporativo (B2B)</option>
                        <option value="B2C">Personal (B2C)</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="sort-leads">Ordenar por:</label>
                    <select id="sort-leads" onchange="applyFilters()">
                        <option value="RECENT">Más recientes</option>
                        <option value="PRIORITY_DESC">Mayor prioridad</option>
                        <option value="PRIORITY_ASC">Menor prioridad</option>
                    </select>
                </div>
            </div>

            <!-- Contenedor de Leads -->
            <div id="leads-container"></div>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
