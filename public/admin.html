<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bandeja CRM Ejecutivo - Futuro Academy</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Outfit', sans-serif;
            margin: 0;
            padding: 0;
            background: #090d16;
            color: #f1f5f9;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* Enlace de regreso */
        .back-link {
            text-decoration: none;
            color: #94a3b8;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.2s;
            display: inline-block;
            margin-bottom: 24px;
        }

        .back-link:hover {
            color: #ffffff;
        }

        /* Pantallas */
        .screen {
            display: none;
        }

        .screen.active {
            display: block;
        }

        /* Login */
        #admin-login-section {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            max-width: 420px;
            margin: 80px auto 0 auto;
            padding: 48px;
            border-radius: 16px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            text-align: center;
        }

        #admin-login-section h2 {
            font-size: 26px;
            font-weight: 600;
            margin: 0 0 12px 0;
            color: #ffffff;
        }

        #admin-login-section p {
            font-size: 14px;
            color: #94a3b8;
            margin: 0 0 32px 0;
            font-weight: 300;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #cbd5e1;
            margin-bottom: 8px;
        }

        input[type="text"], input[type="password"] {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 15px;
            font-family: inherit;
            width: 100%;
            box-sizing: border-box;
            outline: none;
            transition: all 0.3s;
        }

        input[type="text"]:focus, input[type="password"]:focus {
            border-color: #38bdf8;
            background: rgba(255, 255, 255, 0.06);
        }

        .btn {
            background: #0284c7;
            color: #ffffff;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14.5px;
            font-weight: 500;
            font-family: inherit;
            transition: all 0.3s;
        }

        .btn:hover:not(:disabled) {
            background: #0ea5e9;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.04);
            color: #e2e8f0;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.16);
            color: #ffffff;
        }

        .login-error {
            color: #ef4444;
            font-size: 13.5px;
            margin-top: 16px;
            font-weight: 400;
            min-height: 20px;
        }

        /* Dashboard */
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding-bottom: 24px;
            margin-bottom: 32px;
        }

        .dashboard-header h2 {
            font-size: 26px;
            font-weight: 600;
            margin: 0;
            color: #ffffff;
        }

        .header-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .user-welcome {
            font-size: 14px;
            color: #94a3b8;
            margin-right: 12px;
        }

        .user-welcome span {
            color: #ffffff;
            font-weight: 500;
        }

        /* Analíticas Widgets */
        .analytics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .widget-card {
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.06);
            padding: 24px;
            border-radius: 12px;
        }

        .widget-card .title {
            font-size: 13px;
            font-weight: 500;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
        }

        .widget-card .value {
            font-size: 28px;
            font-weight: 700;
            color: #ffffff;
        }

        /* Barra de filtros */
        .filter-bar {
            background: rgba(15, 23, 42, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.06);
            padding: 16px 24px;
            border-radius: 10px;
            margin-bottom: 32px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: center;
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .filter-group label {
            font-size: 14px;
            color: #94a3b8;
            font-weight: 400;
        }

        select {
            background: #0f172a;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff;
            padding: 8px 16px;
            border-radius: 6px;
            font-family: inherit;
            font-size: 14px;
            outline: none;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        select:focus {
            border-color: #38bdf8;
        }

        /* Contenedor de Leads */
        #leads-container {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .lead-card {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-left: 6px solid #0284c7;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            transition: transform 0.2s, border-color 0.2s;
        }

        .lead-card:hover {
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.12);
        }

        .lead-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            padding-bottom: 12px;
            margin-bottom: 16px;
        }

        .lead-header h3 {
            margin: 0;
            font-size: 18px;
            font-weight: 600;
            color: #ffffff;
        }

        .priority-badge {
            background: rgba(2, 132, 199, 0.15);
            color: #38bdf8;
            border: 1px solid rgba(2, 132, 199, 0.3);
            padding: 6px 14px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 13px;
        }

        .lead-info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 16px;
            margin-bottom: 16px;
        }

        .lead-info-item p {
            margin: 0 0 6px 0;
            font-size: 14px;
            line-height: 1.5;
            color: #cbd5e1;
        }

        .lead-info-item strong {
            color: #94a3b8;
            font-weight: 500;
        }

        .lead-status-row {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14.5px;
            margin-top: 12px;
        }

        .status-indicator {
            font-weight: 600;
        }

        .proposal-area {
            margin-top: 20px;
            border-top: 1px dashed rgba(255, 255, 255, 0.08);
            padding-top: 16px;
        }

        .proposal-area label {
            display: block;
            font-size: 13.5px;
            font-weight: 500;
            color: #cbd5e1;
            margin-bottom: 8px;
        }

        textarea {
            width: 100%;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #ffffff;
            padding: 12px;
            border-radius: 8px;
            font-family: inherit;
            font-size: 14px;
            line-height: 1.5;
            box-sizing: border-box;
            outline: none;
            resize: vertical;
            transition: border-color 0.2s;
        }

        textarea:focus {
            border-color: #38bdf8;
            background: rgba(255, 255, 255, 0.04);
        }

        .lead-actions {
            margin-top: 16px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }

        .btn-success { background: #059669; }
        .btn-success:hover { background: #10b981; }

        .btn-warning { background: #d97706; }
        .btn-warning:hover { background: #f59e0b; }

        .btn-danger { background: #dc2626; }
        .btn-danger:hover { background: #ef4444; }

        .btn-delete {
            background: transparent;
            color: #94a3b8;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .btn-delete:hover {
            background: rgba(220, 38, 38, 0.1);
            border-color: rgba(220, 38, 38, 0.3);
            color: #f87171;
        }
    </style>
</head>
<body>

    <div class="container">
        <a href="index.html" class="back-link">Regresar al inicio</a>

        <!-- PANTALLA LOGIN -->
        <div id="admin-login-section" class="screen active">
            <h2>Acceso Ejecutivo</h2>
            <p>Ingrese las credenciales corporativas para ver la bandeja de leads calificados por la IA.</p>
            
            <div class="form-group">
                <label for="admin-user">Usuario</label>
                <input type="text" id="admin-user" placeholder="Ingrese su usuario">
            </div>

            <div class="form-group">
                <label for="admin-pass">Contraseña</label>
                <input type="password" id="admin-pass" placeholder="Ingrese su contraseña">
            </div>

            <button class="btn" id="login-btn" style="width: 100%; margin-top: 8px;" onclick="loginAdmin()">Ingresar al Dashboard</button>
            <div class="login-error" id="login-error"></div>
        </div>

        <!-- PANTALLA BANDEJA CRM -->
        <div id="admin-dashboard-section" class="screen">
            <div class="dashboard-header">
                <h2>Bandeja de CRM Ejecutivo</h2>
                <div class="header-actions">
                    <div class="user-welcome">Usuario: <span id="admin-nombre"></span></div>
                    <button class="btn btn-secondary" onclick="loadLeads()">Actualizar</button>
                    <button class="btn btn-secondary" onclick="logoutAdmin()">Cerrar Sesión</button>
                </div>
            </div>

            <!-- Analíticas Widgets -->
            <div class="analytics-grid">
                <div class="widget-card">
                    <div class="title">Total Prospectos</div>
                    <div class="value" id="kpi-total">0</div>
                </div>
                <div class="widget-card">
                    <div class="title">Clientes Corporativos (B2B)</div>
                    <div class="value" id="kpi-b2b">0</div>
                </div>
                <div class="widget-card">
                    <div class="title">Clientes Personales (B2C)</div>
                    <div class="value" id="kpi-b2c">0</div>
                </div>
                <div class="widget-card">
                    <div class="title">Promedio Prioridad</div>
                    <div class="value" id="kpi-priority">0.0</div>
                </div>
            </div>

            <!-- Barra de Filtros -->
            <div class="filter-bar">
                <div class="filter-group">
                    <label for="filter-type">Tipo de Cliente:</label>
                    <select id="filter-type" onchange="applyFilters()">
                        <option value="ALL">Todos</option>
                        <option value="B2B">Corporativo (B2B)</option>
                        <option value="B2C">Personal (B2C)</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="sort-leads">Ordenar por:</label>
                    <select id="sort-leads" onchange="applyFilters()">
                        <option value="RECENT">Más recientes</option>
                        <option value="PRIORITY_DESC">Mayor prioridad</option>
                        <option value="PRIORITY_ASC">Menor prioridad</option>
                    </select>
                </div>
            </div>

            <!-- Contenedor de Leads -->
            <div id="leads-container"></div>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
