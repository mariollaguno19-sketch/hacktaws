<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Acceso - Futuro Academy</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Outfit', sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            background: #090d16;
            overflow: hidden;
        }

        /* Bento Grid Layout */
        .bento-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            width: 90%;
            max-width: 750px;
            box-sizing: border-box;
        }

        .bento-card {
            border-radius: 24px;
            padding: 36px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 240px;
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .bento-card:hover {
            transform: translateY(-4px);
        }

        .bento-header {
            grid-column: span 2;
            background: #c5f82a; /* Verde Neón */
            color: #000000;
            min-height: auto;
            padding: 32px 36px;
        }

        .bento-header .subtitle {
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: rgba(0, 0, 0, 0.6);
            margin-bottom: 8px;
        }

        .bento-header h1 {
            font-size: 36px;
            font-weight: 700;
            margin: 0;
            letter-spacing: -0.03em;
            line-height: 1.15;
        }

        .bento-client {
            background: #c2f2e9; /* Menta */
            color: #000000;
        }

        .bento-admin {
            background: #ffd3e8; /* Rosa Pastel */
            color: #000000;
        }

        .card-title-area h2 {
            font-size: 24px;
            font-weight: 700;
            margin: 0 0 12px 0;
            letter-spacing: -0.02em;
        }

        .card-title-area p {
            font-size: 15px;
            font-weight: 400;
            line-height: 1.45;
            margin: 0;
            color: rgba(0, 0, 0, 0.7);
        }

        /* Botón píldora */
        .btn-pill {
            background: #000000;
            color: #ffffff;
            border: none;
            padding: 12px 28px;
            border-radius: 9999px;
            font-weight: 600;
            font-size: 14.5px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            align-self: flex-start;
            transition: all 0.2s;
            text-align: center;
            margin-top: 24px;
        }

        .btn-pill:hover {
            background: #1e293b;
            transform: scale(1.03);
        }

        /* Responsive */
        @media (max-width: 600px) {
            .bento-grid {
                grid-template-columns: 1fr;
            }
            .bento-header {
                grid-column: span 1;
            }
        }
    </style>
</head>
<body>

    <div class="bento-grid">
        <!-- Header del Bento -->
        <div class="bento-card bento-header">
            <div>
                <div class="subtitle">Futuro Academy</div>
                <h1>Portal de Ventas y CRM Comercial</h1>
            </div>
        </div>

        <!-- Tarjeta del Cliente -->
        <div class="bento-card bento-client">
            <div class="card-title-area">
                <h2>Portal de Clientes</h2>
                <p>Inicie una sesión interactiva de asesoría comercial y financiera.</p>
            </div>
            <a href="usuario.html" class="btn-pill">Ingresar</a>
        </div>

        <!-- Tarjeta del Admin -->
        <div class="bento-card bento-admin">
            <div class="card-title-area">
                <h2>Bandeja CRM</h2>
                <p>Monitoree y gestione los perfiles calificados por el asesor virtual.</p>
            </div>
            <a href="admin.html" class="btn-pill">Gestionar</a>
        </div>
    </div>

</body>
</html>
